<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <title>ねこまる</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app" aria-label="ねこまる">
      <section id="titleScreen" class="title-screen" aria-label="タイトル画面">
        <div class="title-mark">
          <div id="titleMascot" class="title-mascot" aria-hidden="true">
            <span class="title-sparkle title-sparkle-a"></span>
            <span class="title-sparkle title-sparkle-b"></span>
            <span class="title-sparkle title-sparkle-c"></span>
            <span class="title-sparkle title-sparkle-d"></span>
            <img id="titleMascotOpen" class="title-mascot-img is-visible" src="./assets/title/nekomaru_king_open.png" alt="" />
            <img id="titleMascotSmile" class="title-mascot-img" src="./assets/title/nekomaru_king_smile.png" alt="" />
          </div>
          <h1>ねこまる</h1>
          <p>ぽふっと合体</p>
        </div>
        <div class="title-best">
          <span class="label">BEST</span>
          <strong id="titleBest">0</strong>
        </div>
        <div class="title-sound">
          <button id="titleToggleBgm" class="sound-toggle" type="button" aria-pressed="true">BGM ON</button>
          <button id="titleToggleSe" class="sound-toggle" type="button" aria-pressed="true">SE ON</button>
        </div>
        <div class="title-sub-actions">
          <button id="openRanking" class="title-sub-button" type="button">ランキング</button>
          <button id="openTitleCollection" class="title-sub-button" type="button">称号</button>
        </div>
        <button id="startGame" class="start-button" type="button">はじめる</button>
        <div id="rankingPanel" class="ranking-panel hidden" aria-label="ランキング画面">
          <div class="ranking-card">
            <h2>オンラインランキング</h2>
            <p id="rankingStatus" class="ranking-status" aria-live="polite"></p>
            <ol id="rankingList" class="ranking-list"></ol>
            <button id="closeRanking" type="button">閉じる</button>
          </div>
        </div>
        <div id="titleCollectionPanel" class="ranking-panel hidden" aria-label="称号一覧">
          <div class="ranking-card title-collection-card">
            <h2>称号</h2>
            <p class="ranking-status">BESTで自動獲得</p>
            <ol id="titleCollectionList" class="title-collection-list"></ol>
            <p class="title-collection-hint">さらに上の称号も準備中...</p>
            <button id="closeTitleCollection" type="button">閉じる</button>
          </div>
        </div>
      </section>

      <section class="hud" aria-label="スコア">
        <div>
          <span class="label">SCORE</span>
          <strong id="score">0</strong>
        </div>
        <h1>ねこまる</h1>
        <div>
          <span class="label">BEST</span>
          <strong id="best">0</strong>
        </div>
      </section>

      <section class="game-wrap">
        <canvas id="game" aria-label="ゲーム画面"></canvas>
        <button id="pauseButton" class="pause-button" type="button" aria-label="ポーズ" hidden>II</button>
        <div class="next-panel" aria-label="次の猫">
          <span>NEXT</span>
          <canvas id="nextPreview" width="56" height="56" aria-hidden="true"></canvas>
          <div id="nextCat" class="next-cat">白猫</div>
        </div>
        <div id="aim" class="aim" aria-hidden="true"></div>
        <div id="message" class="message hidden">
          <h2>GAME OVER</h2>
          <p id="finalScore">SCORE 0</p>
          <p id="finalMaxCat">最大到達：白猫</p>
          <p id="finalTitle">称号：ねこだま初心者</p>
          <form id="onlineRankingForm" class="online-ranking-form">
            <label for="playerName">NAME</label>
            <input id="playerName" type="text" maxlength="12" autocomplete="nickname" inputmode="text" placeholder="なまえ" />
            <button id="submitOnlineRanking" type="submit">ランキングに送信</button>
            <p id="onlineRankingStatus" aria-live="polite"></p>
          </form>
          <button id="copyShareText" type="button">投稿用テキストをコピー</button>
          <button id="restart" type="button">もういちど遊ぶ</button>
        </div>
        <div id="pauseScreen" class="pause-screen hidden" aria-label="ポーズ画面">
          <div class="pause-panel">
            <h2>PAUSE</h2>
            <button id="resumeGame" type="button">ゲームに戻る</button>
            <button id="retryGame" type="button">やりなおす</button>
            <button id="backToTitle" type="button">タイトルへ戻る</button>
            <label>
              <span>BGM</span>
              <input id="bgmVolume" type="range" min="0" max="1" step="0.05" value="0.45" />
            </label>
            <label>
              <span>SE</span>
              <input id="seVolume" type="range" min="0" max="1" step="0.05" value="0.7" />
            </label>
          </div>
        </div>
      </section>

      <section class="controls" aria-label="操作">
        <div id="dropZone" class="drop-zone" role="button" tabindex="0" aria-label="猫を落とす">
          <div class="drop-zone-rail" aria-hidden="true">
            <span class="drop-zone-thumb"></span>
          </div>
        </div>
      </section>
    </main>

    <script src="./vendor/matter.min.js"></script>
    <script src="./supabase-config.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
